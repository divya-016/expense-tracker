<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CA Firm Expense Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6fa; color: #1a1a2e; }
    header { background: #1a1a2e; color: white; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 13px; color: #aab; }
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
    .card .value { font-size: 26px; font-weight: 700; color: #1a1a2e; }
    .card .value span { font-size: 14px; font-weight: 400; color: #888; }
    .card.accent { background: #1a1a2e; }
    .card.accent .label { color: #aab; }
    .card.accent .value { color: white; }
    .main { display: grid; grid-template-columns: 360px 1fr; gap: 20px; align-items: start; }
    @media(max-width: 768px) { .main { grid-template-columns: 1fr; } }
    .form-card, .chart-card, .table-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .form-card h2, .chart-card h2, .table-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; }
    .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e4ef; border-radius: 8px; font-size: 14px; color: #1a1a2e; }
    .form-group input:focus, .form-group select:focus { border-color: #5c6bc0; outline: none; }
    .btn-add { width: 100%; padding: 12px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .right-panel { display: flex; flex-direction: column; gap: 20px; }
    .chart-wrap { position: relative; height: 220px; }
    .table-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 10px; }
    .filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #e0e4ef; background: white; font-size: 12px; cursor: pointer; color: #555; font-weight: 500; }
    .filter-btn.active, .filter-btn:hover { background: #1a1a2e; color: white; border-color: #1a1a2e; }
    .btn-export { padding: 7px 16px; background: #eef2ff; color: #3949ab; border: 1.5px solid #c5cae9; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { text-align: left; padding: 8px 10px; color: #888; font-size: 11px; text-transform: uppercase; border-bottom: 1.5px solid #f0f2f8; }
    tbody tr { border-bottom: 1px solid #f5f6fa; }
    tbody tr:hover { background: #fafbff; }
    td { padding: 11px 10px; vertical-align: middle; }
    td.amount { font-weight: 700; color: #c0392b; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .empty-msg { text-align: center; color: #aaa; padding: 30px 0; font-size: 14px; }
    .btn-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; }
    .btn-delete:hover { color: #e74c3c; }
    #toast { position: fixed; bottom: 28px; right: 28px; background: #2ecc71; color: white; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<header>
  <h1>📊 CA Firm Expense Tracker</h1>
  <span id="today-date"></span>
</header>
<div class="container">
  <div class="cards">
    <div class="card accent"><div class="label">Total Expenses</div><div class="value" id="total-amount">₹0</div></div>
    <div class="card"><div class="label">No. of Entries</div><div class="value" id="total-count">0 <span>records</span></div></div>
    <div class="card"><div class="label">Top Category</div><div class="value" id="top-category" style="font-size:18px;">—</div></div>
    <div class="card"><div class="label">This Month</div><div class="value" id="this-month">₹0</div></div>
  </div>
  <div class="main">
    <div class="form-card">
      <h2>➕ Add Expense</h2>
      <div class="form-group"><label>Date</label><input type="date" id="inp-date"/></div>
      <div class="form-group"><label>Description</label><input type="text" id="inp-desc" placeholder="e.g. Client meeting lunch"/></div>
      <div class="form-group"><label>Category</label>
        <select id="inp-cat">
          <option value="">Select category</option>
          <option>Travel</option><option>Client Entertainment</option><option>Office Supplies</option>
          <option>Software</option><option>Meals</option><option>Audit Fees</option><option>Miscellaneous</option>
        </select>
      </div>
      <div class="form-group"><label>Amount (₹)</label><input type="number" id="inp-amount" placeholder="e.g. 1500" min="0"/></div>
      <div class="form-group"><label>Paid By</label><input type="text" id="inp-paid" placeholder="e.g. Rajesh Kumar"/></div>
      <button class="btn-add" onclick="addExpense()">Add Expense</button>
    </div>
    <div class="right-panel">
      <div class="chart-card">
        <h2>📈 Expenses by Category</h2>
        <div class="chart-wrap"><canvas id="myChart"></canvas></div>
      </div>
      <div class="table-card">
        <div class="table-header">
          <h2>📋 All Expenses</h2>
          <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
        </div>
        <div class="filter-row">
          <button class="filter-btn active" onclick="filterCat('All',this)">All</button>
          <button class="filter-btn" onclick="filterCat('Travel',this)">Travel</button>
          <button class="filter-btn" onclick="filterCat('Client Entertainment',this)">Client Ent.</button>
          <button class="filter-btn" onclick="filterCat('Office Supplies',this)">Office</button>
          <button class="filter-btn" onclick="filterCat('Software',this)">Software</button>
          <button class="filter-btn" onclick="filterCat('Meals',this)">Meals</button>
          <button class="filter-btn" onclick="filterCat('Audit Fees',this)">Audit</button>
          <button class="filter-btn" onclick="filterCat('Miscellaneous',this)">Misc.</button>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>#</th><th>Date</th><th>Description</th><th>Category</th><th>Paid By</th><th>Amount</th><th></th></tr></thead>
            <tbody id="expense-table-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="toast">✅ Expense added!</div>
<script>
  let expenses = JSON.parse(localStorage.getItem('ca_expenses') || '[]');
  let currentFilter = 'All', chartInstance = null;
  const COLORS = {'Travel':'#5c6bc0','Client Entertainment':'#ef5350','Office Supplies':'#26a69a','Software':'#ab47bc','Meals':'#ffa726','Audit Fees':'#42a5f5','Miscellaneous':'#8d6e63'};

  document.getElementById('today-date').textContent = new Date().toDateString();
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];

  if (expenses.length === 0) {
    expenses = [
      {id:1,date:'2025-04-01',desc:'Taxi to client office',cat:'Travel',paid:'Anita Shah',amount:850},
      {id:2,date:'2025-04-03',desc:'Team lunch - audit kickoff',cat:'Meals',paid:'Rajesh Kumar',amount:2400},
      {id:3,date:'2025-04-05',desc:'Tally software renewal',cat:'Software',paid:'Priya Nair',amount:8500},
      {id:4,date:'2025-04-08',desc:'Client dinner - M/s Verma & Co',cat:'Client Entertainment',paid:'Anita Shah',amount:5200},
      {id:5,date:'2025-04-10',desc:'A4 paper and stationery',cat:'Office Supplies',paid:'Rajesh Kumar',amount:650},
      {id:6,date:'2025-04-12',desc:'Train fare - Pune audit visit',cat:'Travel',paid:'Priya Nair',amount:1200},
      {id:7,date:'2025-04-15',desc:'GST filing fee',cat:'Audit Fees',paid:'Anita Shah',amount:3500},
      {id:8,date:'2025-04-18',desc:'Printer cartridges',cat:'Office Supplies',paid:'Rajesh Kumar',amount:1100},
      {id:9,date:'2025-04-20',desc:'Client site visit cab',cat:'Travel',paid:'Priya Nair',amount:600},
      {id:10,date:'2025-04-22',desc:'Zoom Pro subscription',cat:'Software',paid:'Anita Shah',amount:1600}
    ];
    save();
  }
  render();

  function addExpense() {
    const date=document.getElementById('inp-date').value, desc=document.getElementById('inp-desc').value.trim(),
          cat=document.getElementById('inp-cat').value, amount=parseFloat(document.getElementById('inp-amount').value),
          paid=document.getElementById('inp-paid').value.trim();
    if(!date||!desc||!cat||isNaN(amount)||amount<=0||!paid){alert('Please fill in all fields correctly.');return;}
    expenses.unshift({id:Date.now(),date,desc,cat,paid,amount});
    save(); render();
    ['inp-desc','inp-amount','inp-cat','inp-paid'].forEach(id=>document.getElementById(id).value='');
    const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000);
  }

  function deleteExpense(id){if(!confirm('Delete this expense?'))return; expenses=expenses.filter(e=>e.id!==id); save(); render();}
  function filterCat(cat,btn){currentFilter=cat; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderTable();}
  function save(){localStorage.setItem('ca_expenses',JSON.stringify(expenses));}
  function render(){renderCards();renderTable();renderChart();}

  function renderCards(){
    const total=expenses.reduce((s,e)=>s+e.amount,0);
    document.getElementById('total-amount').textContent='₹'+total.toLocaleString('en-IN');
    document.getElementById('total-count').innerHTML=expenses.length+' <span>records</span>';
    const ct={}; expenses.forEach(e=>{ct[e.cat]=(ct[e.cat]||0)+e.amount;});
    const top=Object.entries(ct).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('top-category').textContent=top?top[0]:'—';
    const now=new Date();
    const m=expenses.filter(e=>{const d=new Date(e.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,e)=>s+e.amount,0);
    document.getElementById('this-month').textContent='₹'+m.toLocaleString('en-IN');
  }

  function renderTable(){
    const filtered=currentFilter==='All'?expenses:expenses.filter(e=>e.cat===currentFilter);
    const tbody=document.getElementById('expense-table-body');
    if(!filtered.length){tbody.innerHTML='<tr><td colspan="7" class="empty-msg">No expenses in this category yet.</td></tr>';return;}
    tbody.innerHTML=filtered.map((e,i)=>`<tr>
      <td style="color:#aaa">${i+1}</td><td>${fmtDate(e.date)}</td><td>${e.desc}</td>
      <td><span class="badge" style="background:${COLORS[e.cat]||'#888'}22;color:${COLORS[e.cat]||'#888'}">${e.cat}</span></td>
      <td style="color:#555">${e.paid}</td><td class="amount">₹${e.amount.toLocaleString('en-IN')}</td>
      <td><button class="btn-delete" onclick="deleteExpense(${e.id})">✕</button></td></tr>`).join('');
  }

  function renderChart(){
    const ct={}; expenses.forEach(e=>{ct[e.cat]=(ct[e.cat]||0)+e.amount;});
    const labels=Object.keys(ct), data=Object.values(ct), colors=labels.map(l=>COLORS[l]||'#888');
    if(chartInstance)chartInstance.destroy();
    chartInstance=new Chart(document.getElementById('myChart'),{type:'doughnut',
      data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#fff'}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{font:{size:12},boxWidth:14,padding:12}},
          tooltip:{callbacks:{label:ctx=>` ₹${ctx.parsed.toLocaleString('en-IN')} (${Math.round(ctx.parsed/data.reduce((a,b)=>a+b,0)*100)}%)`}}}}});
  }

  function exportCSV(){
    const csv=[['#','Date','Description','Category','Paid By','Amount (INR)'],
      ...expenses.map((e,i)=>[i+1,e.date,`"${e.desc}"`,e.cat,e.paid,e.amount])].map(r=>r.join(',')).join('\n');
    const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='CA_Expenses.csv'; a.click();
  }

  function fmtDate(d){const [y,m,day]=d.split('-'); return `${day} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]} ${y}`;}
</script>
</body>
</html>
